name: Deploy to Azure

# Se ejecuta al subir a main, o manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ova-residencial
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 1) Frontend: compilar y dejarlo dentro de backend/public
      - name: Compilar frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copiar frontend a backend/public
        run: |
          rm -rf backend/public
          cp -r frontend/dist backend/public

      # 2) Backend: instalar, generar Prisma (motor Linux) y compilar TypeScript
      - name: Compilar backend
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      # 3) Publicar en Azure App Service
      - name: Desplegar a Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
